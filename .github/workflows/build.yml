name: Build and Push

on:
  workflow_dispatch:
    inputs:
      yyyymm:
        description: "Build tag in YYYYMM format (e.g. 202607)"
        required: false
        type: string
  schedule:
    # Quarterly: 1st day of Jan, Apr, Jul, Oct at 00:00 UTC
    - cron: "0 0 1 1,4,7,10 *"
  release:
    types: [published]

env:
  REGISTRY_IMAGE: zerocustom/gotify-e

jobs:
  build:
    strategy:
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
          - linux/arm/v7
          - linux/arm/v6
          - linux/ppc64le
      fail-fast: false

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Normalize platform tag
        id: platform
        run: echo "tag=${platform//\//-}" >> $GITHUB_OUTPUT
        env:
          platform: ${{ matrix.platform }}

      - name: Build and push by platform
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.REGISTRY_IMAGE }}:${{ steps.platform.outputs.tag }}
          labels: |
            org.opencontainers.image.platform=${{ matrix.platform }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}
          provenance: false
          sbom: false

  merge:
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ github.event.inputs.yyyymm }},enable=${{ github.event.inputs.yyyymm != '' }}
            type=schedule,pattern={{date '200601'}}

      - name: Create multi-arch manifest
        run: |
          PLATFORM_TAGS=""
          for platform in linux/amd64 linux/arm64 linux/arm/v7 linux/arm/v6 linux/ppc64le; do
            tag="${platform//\//-}"
            PLATFORM_TAGS="$PLATFORM_TAGS ${{ env.REGISTRY_IMAGE }}:${tag}"
          done

          TAG_ARGS=$(echo '${{ steps.meta.outputs.json }}' | jq -r '.tags[] | "-t " + .' | tr '\n' ' ')

          docker buildx imagetools create $PLATFORM_TAGS $TAG_ARGS
