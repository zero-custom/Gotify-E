services:
  gotify:
    image: gotify/server:latest
    restart: unless-stopped
    ports:
      - 8080:80
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - gotify-data:/app/data

  gotify-gw:
    image: zerocustom/gotify-e:latest
    restart: unless-stopped
    ports:
      - 8765:8765
    environment:
      - GOTIFY_BACKEND=http://gotify:80
      - PUBLIC_HOST=localhost:8765
      - HOST=0.0.0.0
      - PORT=8765
      - MAX_UPLOAD_MB=50
      - MAX_FILES_PER_REQUEST=5
      - PENDING_TIMEOUT_MINUTES=120
      - CLEANUP_INTERVAL_MINUTES=30
    volumes:
      - uploads-data:/data
    depends_on:
      - gotify
